<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- Theme -->
    <meta name="theme-color" content="#5B4FE8" />

    <!-- SEO -->
    <meta
      name="description"
      content="DhanKist - Daily Loan & EMI Collection Manager. Har Roz, Har Kist."
    />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DhanKist" />
    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/icons/icon-192.png"
    />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <title>DhanKist</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: 'Nunito', 'Segoe UI', sans-serif;
        background: #F7F8FC;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        max-width: 430px;
        margin: 0 auto;
        min-height: 100vh;
        position: relative;
        background: #F7F8FC;
      }

      /* Hide scrollbar but keep scroll */
      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run DhanKist.
    </noscript>
    <div id="root"></div>
  </body>
</html>
